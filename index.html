<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Neha Agarwal | ENT Specialist & Head Neck Surgeon | Guwahati</title>
<meta name="description" content="Dr. Neha Agarwal – 17+ years experienced ENT specialist in Guwahati. Expert in Ear, Nose, Throat, Pediatric ENT & Head-Neck Surgery at Dr Neha ENT Centre, Christian Basti.">
<meta name="keywords" content="ENT specialist Guwahati, ear nose throat doctor Guwahati, pediatric ENT Guwahati, sinus treatment Guwahati, Dr Neha Agarwal">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #FAFCFF;
    --off-white: #F4F8FF;
    --blue-pale: #EBF3FF;
    --blue-light: #C8DEFF;
    --blue-mid: #6499D0;
    --blue-deep: #1A4A8A;
    --blue-dark: #0D2E5C;
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --gold-pale: #FDF8ED;
    --text-dark: #1A1E2E;
    --text-mid: #4A5568;
    --text-light: #8A9AB5;
    --shadow-sm: 0 2px 16px rgba(26,74,138,0.07);
    --shadow-md: 0 8px 40px rgba(26,74,138,0.12);
    --shadow-lg: 0 20px 60px rgba(26,74,138,0.18);
    --radius: 16px;
    --radius-sm: 10px;
    --font-display: 'Cormorant Garamond', serif;
    --font-head: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--white);
    color: var(--text-dark);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--off-white); }
  ::-webkit-scrollbar-thumb { background: var(--blue-mid); border-radius: 10px; }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(250,252,255,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(200,222,255,0.4);
    padding: 0 5vw;
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
    transition: box-shadow 0.3s;
  }
  nav.scrolled { box-shadow: var(--shadow-md); }
  .nav-brand {
    display: flex; align-items: center; gap: 12px; text-decoration: none;
  }
  .nav-logo {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    display: flex; align-items: center; justify-content: center;
    color: white; font-family: var(--font-display); font-size: 18px; font-weight: 600;
    box-shadow: 0 4px 16px rgba(26,74,138,0.3);
  }
  .nav-brand-text { line-height: 1.2; }
  .nav-brand-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--blue-dark); letter-spacing: 0.02em; }
  .nav-brand-sub { font-size: 11px; color: var(--text-light); font-weight: 400; letter-spacing: 0.06em; text-transform: uppercase; }
  .nav-links { display: flex; align-items: center; gap: 32px; }
  .nav-links a { text-decoration: none; font-size: 14px; font-weight: 500; color: var(--text-mid); transition: color 0.2s; letter-spacing: 0.02em; }
  .nav-links a:hover { color: var(--blue-deep); }
  .nav-cta {
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    color: white !important;
    padding: 10px 22px; border-radius: 50px;
    font-size: 13px !important; font-weight: 600 !important;
    box-shadow: 0 4px 16px rgba(26,74,138,0.3);
    transition: transform 0.2s, box-shadow 0.2s !important;
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(26,74,138,0.4) !important; }
  .nav-hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
  .nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--blue-dark); border-radius: 2px; transition: 0.3s; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background: linear-gradient(160deg, #EBF3FF 0%, #F4F8FF 40%, #FDF8ED 100%);
    display: flex; align-items: center;
    padding: 100px 5vw 60px;
    position: relative; overflow: hidden;
  }
  .hero-bg-circle {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(100,153,208,0.12) 0%, transparent 70%);
  }
  .hero-bg-circle.c1 { width: 700px; height: 700px; top: -200px; right: -100px; }
  .hero-bg-circle.c2 { width: 400px; height: 400px; bottom: -100px; left: -100px; background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%); }
  .hero-grid-pattern {
    position: absolute; inset: 0; opacity: 0.03;
    background-image: linear-gradient(var(--blue-deep) 1px, transparent 1px), linear-gradient(90deg, var(--blue-deep) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .hero-inner {
    max-width: 1200px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    position: relative; z-index: 1;
  }
  .hero-content { animation: fadeUp 0.8s ease both; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3);
    padding: 8px 16px; border-radius: 50px;
    font-size: 12px; font-weight: 600; color: #9A6E1C; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 28px;
  }
  .hero-badge::before { content: "✦"; font-size: 10px; }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(42px, 5vw, 64px);
    font-weight: 600; line-height: 1.1;
    color: var(--blue-dark);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .hero-title em { font-style: italic; color: var(--blue-mid); }
  .hero-doctor-name {
    font-family: var(--font-head);
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 700; color: var(--blue-deep);
    margin-bottom: 20px;
  }
  .hero-sub {
    font-size: 16px; color: var(--text-mid); line-height: 1.8;
    margin-bottom: 36px; font-weight: 400; max-width: 440px;
  }
  .hero-ctas { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 44px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--blue-deep) 0%, var(--blue-mid) 100%);
    color: white; padding: 14px 28px; border-radius: 50px;
    font-size: 14px; font-weight: 600; text-decoration: none;
    box-shadow: 0 8px 24px rgba(26,74,138,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    border: none; cursor: pointer;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(26,74,138,0.45); }
  .btn-whatsapp {
    display: inline-flex; align-items: center; gap: 8px;
    background: #25D366; color: white; padding: 14px 28px; border-radius: 50px;
    font-size: 14px; font-weight: 600; text-decoration: none;
    box-shadow: 0 8px 24px rgba(37,211,102,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37,211,102,0.45); }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--blue-deep); padding: 13px 26px; border-radius: 50px;
    font-size: 14px; font-weight: 600; text-decoration: none;
    border: 1.5px solid var(--blue-mid);
    transition: background 0.2s, color 0.2s;
  }
  .btn-outline:hover { background: var(--blue-deep); color: white; }
  .hero-stats {
    display: flex; gap: 32px;
    padding-top: 32px; border-top: 1px solid rgba(100,153,208,0.2);
  }
  .hero-stat { }
  .hero-stat-num {
    font-family: var(--font-display); font-size: 32px; font-weight: 600;
    color: var(--blue-deep); line-height: 1;
  }
  .hero-stat-num span { font-size: 18px; color: var(--gold); }
  .hero-stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; margin-top: 4px; letter-spacing: 0.04em; }
  .hero-image-wrap {
    position: relative; animation: fadeUp 0.8s 0.2s ease both;
  }
  .hero-image-card {
    position: relative;
    background: linear-gradient(160deg, var(--blue-pale) 0%, white 100%);
    border-radius: 24px 24px 24px 80px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    aspect-ratio: 4/5;
    max-height: 560px;
  }
  .hero-image-placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(160deg, #C8DEFF 0%, #E8F3FF 40%, #D4E8FF 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 0;
  }
  .doctor-silhouette {
    width: 85%; max-width: 340px;
  }
  .hero-image-tag {
    position: absolute; bottom: 24px; left: -16px;
    background: white; border-radius: var(--radius-sm);
    padding: 14px 18px; box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 12px;
  }
  .hero-image-tag-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), #E8C870);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .hero-image-tag-text { line-height: 1.3; }
  .hero-image-tag-num { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--blue-dark); }
  .hero-image-tag-sub { font-size: 11px; color: var(--text-light); font-weight: 500; }
  .hero-image-tag2 {
    position: absolute; top: 28px; right: -16px;
    background: white; border-radius: var(--radius-sm);
    padding: 12px 16px; box-shadow: var(--shadow-md);
    display: flex; align-items: center; gap: 10px;
  }
  .verified-badge {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px;
  }
  .hero-image-tag2-text { line-height: 1.3; }
  .hero-image-tag2-label { font-size: 13px; font-weight: 600; color: var(--blue-dark); }
  .hero-image-tag2-sub { font-size: 11px; color: var(--text-light); }
  .hero-gold-line {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: linear-gradient(90deg, var(--gold), transparent);
    border-radius: 0 0 0 80px;
  }

  /* ── SECTION COMMONS ── */
  section { padding: 96px 5vw; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 16px;
  }
  .section-tag::before { content: ""; display: block; width: 24px; height: 2px; background: var(--gold); border-radius: 2px; }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 600; color: var(--blue-dark);
    line-height: 1.15; letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .section-title em { font-style: italic; color: var(--blue-mid); }
  .section-sub { font-size: 16px; color: var(--text-mid); max-width: 520px; line-height: 1.7; }

  /* ── TRUST SECTION ── */
  .trust-section { background: var(--blue-dark); }
  .trust-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
  }
  .trust-card {
    background: rgba(255,255,255,0.04);
    padding: 40px 32px; text-align: center;
    position: relative; overflow: hidden;
    transition: background 0.3s;
  }
  .trust-card:hover { background: rgba(255,255,255,0.08); }
  .trust-card-icon { font-size: 36px; margin-bottom: 16px; }
  .trust-card-num {
    font-family: var(--font-display); font-size: 42px; font-weight: 600;
    color: white; line-height: 1;
  }
  .trust-card-num span { color: var(--gold); }
  .trust-card-label { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 8px; font-weight: 500; letter-spacing: 0.04em; }
  .trust-card-desc { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 6px; line-height: 1.5; }
  .trust-card-border { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0; transition: opacity 0.3s; }
  .trust-card:hover .trust-card-border { opacity: 1; }

  /* ── QUALIFICATIONS ── */
  .qual-section { background: var(--gold-pale); }
  .qual-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .qual-list { margin-top: 32px; display: flex; flex-direction: column; gap: 16px; }
  .qual-item {
    display: flex; align-items: flex-start; gap: 16px;
    background: white; border-radius: var(--radius-sm);
    padding: 20px 24px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s;
  }
  .qual-item:hover { transform: translateX(4px); }
  .qual-item-icon {
    width: 44px; height: 44px; min-width: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .qual-item-title { font-size: 15px; font-weight: 600; color: var(--blue-dark); }
  .qual-item-sub { font-size: 13px; color: var(--text-light); margin-top: 2px; }
  .qual-image-wrap { position: relative; }
  .qual-image-card {
    background: linear-gradient(160deg, var(--blue-pale) 0%, white 100%);
    border-radius: var(--radius) var(--radius) var(--radius) 60px;
    overflow: hidden; aspect-ratio: 3/4;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: flex-end; justify-content: center;
    background: linear-gradient(160deg, #D4E8FF 0%, #EBF3FF 100%);
  }
  .qual-overlay {
    position: absolute; bottom: -16px; right: -16px;
    background: var(--blue-deep); color: white;
    border-radius: var(--radius); padding: 24px 28px;
    text-align: center; box-shadow: var(--shadow-md);
  }
  .qual-overlay-num { font-family: var(--font-display); font-size: 36px; font-weight: 600; color: var(--gold); }
  .qual-overlay-text { font-size: 12px; opacity: 0.7; margin-top: 4px; letter-spacing: 0.04em; }

  /* ── SERVICES ── */
  .services-section { background: var(--white); }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 56px; }
  .service-card {
    background: var(--off-white); border-radius: var(--radius);
    padding: 36px 28px; position: relative; overflow: hidden;
    border: 1px solid transparent;
    transition: all 0.3s; cursor: default;
  }
  .service-card:hover {
    background: white; border-color: var(--blue-light);
    box-shadow: var(--shadow-md); transform: translateY(-4px);
  }
  .service-card::after {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue-deep), var(--blue-mid));
    transform: scaleX(0); transition: transform 0.3s; transform-origin: left;
  }
  .service-card:hover::after { transform: scaleX(1); }
  .service-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--blue-pale); display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 20px;
    transition: background 0.3s;
  }
  .service-card:hover .service-icon { background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid)); }
  .service-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--blue-dark); margin-bottom: 10px; }
  .service-desc { font-size: 14px; color: var(--text-mid); line-height: 1.7; }
  .service-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 16px; font-size: 13px; font-weight: 600; color: var(--blue-deep);
    text-decoration: none; transition: gap 0.2s;
  }
  .service-link:hover { gap: 10px; }

  /* ── APPOINTMENT ── */
  .appt-section { background: linear-gradient(160deg, var(--blue-dark) 0%, #0F3868 100%); }
  .appt-section .section-title { color: white; }
  .appt-section .section-sub { color: rgba(255,255,255,0.6); }
  .appt-section .section-tag { color: var(--gold-light); }
  .appt-section .section-tag::before { background: var(--gold-light); }
  .appt-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 56px; align-items: start; margin-top: 48px; }
  .appt-info { }
  .appt-fee-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 28px; margin-top: 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .appt-fee-icon {
    width: 56px; height: 56px; min-width: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #E8C870);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .appt-fee-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .appt-fee-amount { font-family: var(--font-display); font-size: 36px; font-weight: 600; color: white; }
  .appt-fee-amount small { font-size: 14px; color: rgba(255,255,255,0.5); font-weight: 400; }
  .appt-times { margin-top: 28px; }
  .appt-times-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .time-slots { display: flex; flex-wrap: wrap; gap: 10px; }
  .time-slot {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: white; padding: 8px 16px; border-radius: 50px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .time-slot:hover, .time-slot.active { background: var(--blue-mid); border-color: var(--blue-mid); }
  .time-slot.booked { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }
  .appt-form-card {
    background: white; border-radius: var(--radius);
    padding: 36px; box-shadow: var(--shadow-lg);
  }
  .appt-form-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--blue-dark); margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .form-input, .form-select {
    width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--blue-light); background: var(--off-white);
    font-family: var(--font-body); font-size: 14px; color: var(--text-dark);
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(100,153,208,0.15); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-submit {
    width: 100%; padding: 15px; border-radius: 50px;
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    color: white; border: none; font-family: var(--font-body);
    font-size: 15px; font-weight: 600; cursor: pointer;
    box-shadow: 0 8px 24px rgba(26,74,138,0.35);
    transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .form-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(26,74,138,0.45); }

  /* ── WHY CHOOSE ── */
  .why-section { background: var(--off-white); }
  .why-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 48px; }
  .why-card {
    background: white; border-radius: var(--radius);
    padding: 32px; display: flex; align-items: flex-start; gap: 20px;
    box-shadow: var(--shadow-sm); transition: all 0.3s;
    border: 1px solid transparent;
  }
  .why-card:hover { box-shadow: var(--shadow-md); border-color: var(--blue-light); transform: translateY(-2px); }
  .why-card-icon {
    width: 52px; height: 52px; min-width: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .why-card-title { font-family: var(--font-display); font-size: 19px; font-weight: 600; color: var(--blue-dark); margin-bottom: 8px; }
  .why-card-desc { font-size: 14px; color: var(--text-mid); line-height: 1.7; }

  /* ── REVIEWS ── */
  .reviews-section { background: white; }
  .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
  .review-card {
    background: var(--off-white); border-radius: var(--radius);
    padding: 28px; position: relative;
    border: 1px solid var(--blue-light); transition: all 0.3s;
  }
  .review-card:hover { background: white; box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .review-card::before {
    content: "❝"; position: absolute; top: 20px; right: 24px;
    font-size: 48px; color: var(--blue-pale); line-height: 1; font-family: Georgia, serif;
  }
  .review-stars { color: #F59E0B; font-size: 16px; letter-spacing: 2px; margin-bottom: 14px; }
  .review-text { font-size: 14px; color: var(--text-mid); line-height: 1.75; margin-bottom: 20px; font-style: italic; }
  .review-author { display: flex; align-items: center; gap: 12px; }
  .review-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-pale), var(--blue-light));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--blue-deep);
  }
  .review-name { font-size: 14px; font-weight: 600; color: var(--text-dark); }
  .review-tag { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .review-verified { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #16A34A; margin-top: 4px; font-weight: 500; }

  /* ── CLINIC ── */
  .clinic-section { background: var(--off-white); }
  .clinic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; margin-top: 48px; }
  .clinic-images { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .clinic-img {
    border-radius: var(--radius-sm); overflow: hidden;
    background: linear-gradient(160deg, var(--blue-pale), var(--blue-light));
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; color: var(--blue-mid);
    box-shadow: var(--shadow-sm);
  }
  .clinic-img.large { grid-column: span 2; aspect-ratio: 16/9; }
  .clinic-info { }
  .clinic-detail-card {
    background: white; border-radius: var(--radius); padding: 28px;
    box-shadow: var(--shadow-sm); margin-bottom: 20px;
    display: flex; gap: 16px; align-items: flex-start;
  }
  .clinic-detail-icon {
    width: 44px; height: 44px; min-width: 44px; border-radius: 10px;
    background: var(--blue-pale); display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .clinic-detail-label { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .clinic-detail-value { font-size: 15px; font-weight: 500; color: var(--text-dark); }
  .clinic-detail-value small { display: block; font-size: 13px; color: var(--text-light); font-weight: 400; margin-top: 2px; }
  .map-embed {
    border-radius: var(--radius); overflow: hidden;
    height: 220px; background: var(--blue-pale);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm); position: relative;
    border: 1px solid var(--blue-light);
  }
  .map-embed iframe { width: 100%; height: 100%; border: none; }

  /* ── FAQ ── */
  .faq-section { background: white; }
  .faq-inner { display: grid; grid-template-columns: 1fr 1.4fr; gap: 80px; align-items: start; }
  .faq-list { margin-top: 40px; display: flex; flex-direction: column; gap: 12px; }
  .faq-item {
    background: var(--off-white); border-radius: var(--radius-sm);
    border: 1px solid var(--blue-light); overflow: hidden;
  }
  .faq-question {
    padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; font-size: 15px; font-weight: 500; color: var(--text-dark);
    transition: background 0.2s; gap: 16px;
  }
  .faq-question:hover { background: var(--blue-pale); }
  .faq-toggle {
    width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
    background: var(--blue-pale); display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--blue-deep); transition: transform 0.3s;
  }
  .faq-answer {
    padding: 0 24px; max-height: 0; overflow: hidden; transition: all 0.3s;
    font-size: 14px; color: var(--text-mid); line-height: 1.75;
  }
  .faq-item.open .faq-answer { max-height: 200px; padding: 0 24px 20px; }
  .faq-item.open .faq-toggle { transform: rotate(45deg); background: var(--blue-deep); color: white; }
  .faq-sidebar {
    background: linear-gradient(160deg, var(--blue-dark) 0%, #0F3868 100%);
    border-radius: var(--radius); padding: 40px;
    position: sticky; top: 100px;
  }
  .faq-sidebar-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: white; margin-bottom: 12px; }
  .faq-sidebar-sub { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 32px; }
  .faq-contact-item {
    display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
    color: white;
  }
  .faq-contact-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .faq-contact-label { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.06em; }
  .faq-contact-value { font-size: 15px; font-weight: 500; }

  /* ── BLOG ── */
  .blog-section { background: var(--gold-pale); }
  .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
  .blog-card {
    background: white; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow-sm); transition: all 0.3s;
  }
  .blog-card:hover { box-shadow: var(--shadow-md); transform: translateY(-4px); }
  .blog-img {
    height: 160px; background: linear-gradient(160deg, var(--blue-pale), var(--blue-light));
    display: flex; align-items: center; justify-content: center; font-size: 52px;
  }
  .blog-content { padding: 24px; }
  .blog-tag {
    display: inline-block; background: var(--blue-pale); color: var(--blue-deep);
    padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px;
  }
  .blog-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--blue-dark); line-height: 1.3; margin-bottom: 10px; }
  .blog-excerpt { font-size: 13px; color: var(--text-mid); line-height: 1.7; margin-bottom: 16px; }
  .blog-meta { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 12px; }
  .blog-meta-sep { color: var(--blue-light); }
  .blog-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--blue-deep); text-decoration: none; margin-top: 16px; transition: gap 0.2s; }
  .blog-link:hover { gap: 10px; }

  /* ── FOOTER ── */
  footer {
    background: #07192D; color: white;
    padding: 72px 5vw 32px;
  }
  .footer-grid {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 48px;
    padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .footer-brand { }
  .footer-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .footer-logo-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 20px; font-weight: 600; color: white;
  }
  .footer-logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: white; line-height: 1.2; }
  .footer-logo-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .footer-brand-desc { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.7; max-width: 260px; }
  .footer-socials { display: flex; gap: 10px; margin-top: 24px; }
  .footer-social {
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    cursor: pointer; transition: background 0.2s;
    text-decoration: none;
  }
  .footer-social:hover { background: var(--blue-mid); }
  .footer-col-title { font-size: 13px; font-weight: 600; color: white; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }
  .footer-col-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .footer-col-links li a { text-decoration: none; font-size: 14px; color: rgba(255,255,255,0.5); transition: color 0.2s; }
  .footer-col-links li a:hover { color: white; }
  .footer-contact-item { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
  .footer-contact-icon { font-size: 16px; margin-top: 2px; }
  .footer-contact-text { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .footer-contact-text strong { color: white; display: block; margin-bottom: 2px; font-weight: 500; }
  .footer-bottom {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 28px; flex-wrap: wrap; gap: 16px;
  }
  .footer-copy { font-size: 13px; color: rgba(255,255,255,0.35); }
  .footer-certs { display: flex; gap: 12px; }
  .footer-cert {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 14px; border-radius: 50px; font-size: 11px; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 6px;
  }
</footer>

<!-- STICKY CTA -->
<div class="sticky-cta">
  <a href="https://wa.me/919999999999?text=Hello Dr. Neha, I'd like to book a consultation." target="_blank" class="sticky-btn sticky-btn-wa">
    💬 <span class="sticky-label">WhatsApp</span>
  </a>
  <a href="tel:+919999999999" class="sticky-btn sticky-btn-call">
    📞 <span class="sticky-label">Call Now</span>
  </a>
</div>

<script>
  // Nav scroll effect
  window.addEventListener('scroll', () => {
    document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 20);
  });

  // FAQ toggle
  function toggleFaq(el) {
    const item = el.parentElement;
    const wasOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
    if (!wasOpen) item.classList.add('open');
  }

  // Time slot selection
  function selectSlot(el) {
    if (el.classList.contains('booked')) return;
    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  // Booking form
  function submitBooking() {
    const name = document.getElementById('patientName').value;
    const phone = document.getElementById('patientPhone').value;
    const concern = document.getElementById('patientConcern').value;
    if (!name || !phone || !concern) {
      alert('Please fill in your name, phone number, and concern to proceed.');
      return;
    }
    document.getElementById('bookingForm').style.display = 'none';
    document.getElementById('bookingSuccess').classList.add('show');
  }

  // Set min date for appointment picker
  const today = new Date().toISOString().split('T')[0];
  const dateInput = document.getElementById('patientDate');
  if (dateInput) { dateInput.min = today; dateInput.value = today; }

  // Intersection observer for animations (with fallback)
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.service-card, .why-card, .review-card, .blog-card, .qual-item').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      observer.observe(el);
    });
  } else {
    // Fallback for older browsers
    document.querySelectorAll('.service-card, .why-card, .review-card, .blog-card, .qual-item').forEach(el => {
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    });
  }

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', (e) => {
      const target = document.querySelector(link.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Mobile nav
  document.getElementById('hamburger')?.addEventListener('click', () => {
    const nav = document.querySelector('.nav-links');
    if (nav.style.display === 'flex') {
      nav.style.display = 'none';
    } else {
      nav.style.cssText = 'display:flex;flex-direction:column;position:fixed;top:72px;left:0;right:0;background:rgba(250,252,255,0.98);backdrop-filter:blur(20px);padding:24px 5vw;gap:20px;border-bottom:1px solid var(--blue-light);z-index:999';
    }
  });
</script>
</body>
